name: Update Blog Posts from RSS

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-blog
  cancel-in-progress: false

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update blog posts
        run: npm run update-blog

      - name: Commit portfolio blog data if changed
        id: portfolio-changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/blog.ts

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No portfolio blog data changes to commit"
          else
            git commit -m "chore: Update blog posts from RSS feed"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.portfolio-changes.outputs.changed == 'true'
        env:
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Check blog sync token
        id: sync-token
        if: steps.portfolio-changes.outputs.changed == 'true'
        env:
          BLOG_REPO_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
        run: |
          if [ -z "$BLOG_REPO_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::BLOG_REPO_TOKEN is not configured. Skipping blog repository sync."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout blog repository
        if: steps.portfolio-changes.outputs.changed == 'true' && steps.sync-token.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: Kimgyuilli/blog
          token: ${{ secrets.BLOG_REPO_TOKEN }}
          path: blog

      - name: Sync portfolio build to blog repository
        if: steps.portfolio-changes.outputs.changed == 'true' && steps.sync-token.outputs.skip == 'false'
        run: |
          rm -rf blog/public/portfolio
          mkdir -p blog/public/portfolio
          cp -R build/. blog/public/portfolio/

          cd blog
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/portfolio

          if git diff --cached --quiet; then
            echo "No embedded portfolio changes to commit"
          else
            git commit -m "chore: update embedded portfolio build"
            git push origin main
          fi
